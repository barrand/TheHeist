# Cloud Build CI/CD — triggered on push to main
# Builds and deploys both backend and frontend to Cloud Run (us-west1).
#
# Required substitutions (set in trigger config):
#   _REGION          — e.g. us-west1
#   _BACKEND_SERVICE — e.g. heist-backend
#   _FRONTEND_SERVICE— e.g. heist-frontend
#   _GCS_BUCKET      — e.g. theheist-generated
#
# Required secrets (via Secret Manager):
#   GEMINI_API_KEY   — mounted on the backend Cloud Run service

steps:
  # ----------------------------------------------------------------
  # 1. Build and push backend image
  # ----------------------------------------------------------------
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'backend/Dockerfile'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_BACKEND_SERVICE}:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_BACKEND_SERVICE}:latest'
      - '.'
    id: 'build-backend'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/${_BACKEND_SERVICE}']
    id: 'push-backend'
    waitFor: ['build-backend']

  # ----------------------------------------------------------------
  # 2. Deploy backend to Cloud Run
  # ----------------------------------------------------------------
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_BACKEND_SERVICE}'
      - '--image'
      - 'gcr.io/$PROJECT_ID/${_BACKEND_SERVICE}:$SHORT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8000'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '1'
      - '--timeout'
      - '3600'
      - '--session-affinity'
      - '--set-env-vars'
      - 'GCS_BUCKET=${_GCS_BUCKET}'
      - '--set-secrets'
      - 'GEMINI_API_KEY=GEMINI_API_KEY:latest'
    id: 'deploy-backend'
    waitFor: ['push-backend']

  # ----------------------------------------------------------------
  # 3. Get backend URL for frontend build
  # ----------------------------------------------------------------
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud run services describe ${_BACKEND_SERVICE} \
          --region=${_REGION} --format='value(status.url)' > /workspace/backend_url.txt
        echo "Backend URL: $(cat /workspace/backend_url.txt)"
    id: 'get-backend-url'
    waitFor: ['deploy-backend']

  # ----------------------------------------------------------------
  # 4. Build and push frontend image (with backend URL baked in)
  # ----------------------------------------------------------------
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        BACKEND_URL=$(cat /workspace/backend_url.txt)
        docker build \
          -f frontend/Dockerfile \
          --build-arg BACKEND_URL=$$BACKEND_URL \
          -t gcr.io/$PROJECT_ID/${_FRONTEND_SERVICE}:$SHORT_SHA \
          -t gcr.io/$PROJECT_ID/${_FRONTEND_SERVICE}:latest \
          .
    id: 'build-frontend'
    waitFor: ['get-backend-url']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/${_FRONTEND_SERVICE}']
    id: 'push-frontend'
    waitFor: ['build-frontend']

  # ----------------------------------------------------------------
  # 5. Deploy frontend to Cloud Run
  # ----------------------------------------------------------------
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_FRONTEND_SERVICE}'
      - '--image'
      - 'gcr.io/$PROJECT_ID/${_FRONTEND_SERVICE}:$SHORT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '80'
      - '--memory'
      - '256Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '2'
    id: 'deploy-frontend'
    waitFor: ['push-frontend']

substitutions:
  _REGION: us-west1
  _BACKEND_SERVICE: heist-backend
  _FRONTEND_SERVICE: heist-frontend
  _GCS_BUCKET: theheist-generated

options:
  logging: CLOUD_LOGGING_ONLY
